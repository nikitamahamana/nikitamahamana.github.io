<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikita Mahamana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: black;
  color: #bafcff;
  font-size: 18px;
  line-height: 1.7;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 48px;
  padding: 24px 10%;
  background: black;
  z-index: 1000;
}
nav a {
  color: #00ffff;
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.1em;
}
nav a:hover {
  opacity: 0.7;
}

/* HERO SECTION */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 160px 10% 100px;
  gap: 60px;
  min-height: 100vh;
}
.hero-text {
  flex: 1.1;
}
.hero-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(64px, 7vw, 96px);
  color: #00ffff;
  margin: 0 0 20px;
  line-height: 1.0;
}
.subtitle {
  font-size: 20px;
  color: #00ffff;
  opacity: 0.7;
  letter-spacing: 0.06em;
  margin-bottom: 32px;
}
.hero-text p {
  font-size: 18px;
  line-height: 1.75;
  max-width: 520px;
  margin: 0 0 16px;
  color: #bafcff;
}

/* IMAGE */
.hero-image {
  flex: 1;
  text-align: right;
}
.hero-image img {
  width: 100%;
  max-width: 440px;
  border-radius: 20px;
  box-shadow: 0 0 32px #00ffff55;
  transition: transform 0.4s, box-shadow 0.4s;
}
.hero-image img:hover {
  transform: scale(1.04);
  box-shadow: 0 0 48px #00ffff88;
}

/* STATEMENT */
.statement {
  text-align: center;
  padding: 100px 10%;
}
